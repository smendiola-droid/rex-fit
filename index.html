<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex-Fit | Calendario Filosófico</title>
    <style>
        /* Variables de colores oscuros estéticos */
        :root {
            --bg-dark: #121214;
            --bg-card: #1a1a1e;
            --primary: #bb86fc;
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --border: #29292e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .section {
            margin-bottom: 25px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        #fecha {
            font-size: 1.1rem;
            font-weight: bold;
        }

        #frase {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.4;
            color: #ffffff;
        }

        #autor {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        #reflexion {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        /* Simulación de botón para cambiar de día (Opcional, para pruebas) */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background-color: var(--bg-card);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary);
            color: var(--bg-dark);
        }
    </style>
</head>

        <div class="section">

        <button onclick="irAHoy()">Hoy</button>
        <button onclick="cambiarDia(1)">Siguiente Día →</button>
    </div>

                frase: "La mayor parte de lo que hacemos y decimos no es necesario; si lo eliminas, tendrás más tranquilidad.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Aplica el minimalismo mental hoy. Revisa tu agenda y tus actividades: elimina los compromisos vacíos y las conversaciones que solo te quitan energía."
            },
            231: {
                frase: "Quien tiene un porqué lo suficientemente fuerte puede superar cualquier cómo.",
                autor: "Viktor Frankl (Logoterapia)",
                reflexion: "Cuando encuentras un sentido profundo detrás de tu esfuerzo actual, el cansancio y los obstáculos se vuelven tolerables. Recuerda tu propósito."
            },
            232: {
                frase: "Si quieres ser respetado por los demás, lo mejor es respetarte a ti mismo.",
                autor: "Fiódor Dostoyevski (Existencialismo)",
                reflexion: "El respeto ajeno empieza por cómo te tratas en privado. Cumple las promesas que te hiciste a ti mismo hoy, no te falles."
            },
            233: {
                frase: "La vida es como una obra de teatro: lo que importa no es la duración, sino la calidad de la actuación.",
                autor: "Séneca (Estoicismo)",
                reflexion: "No dejes pasar el día esperando el fin de semana o las vacaciones. Pon tu mejor actitud, enfoque y esfuerzo en lo que estás haciendo justo ahora."
            },
            234: {
                frase: "No hay nada permanente excepto el cambio.",
                autor: "Heráclito (Filosofía Griega)",
                reflexion: "Aceptar la impermanencia te libera del sufrimiento. Si las cosas van bien hoy, disfrútalas; si van mal, recuerda que también van a pasar."
            },
            235: {
                frase: "El deseo de seguridad bloquea la búsqueda de una vida más significativa.",
                autor: "Alan Watts (Filosofía Oriental)",
                reflexion: "Aferrarse a lo seguro te estanca. Toma un pequeño riesgo hoy, sal de tu zona de confort y haz algo que te dé un poco de miedo pero te haga crecer."
            },
            236: {
                frase: "El hombre sabio no se aflige por lo que no tiene, sino que se alegra por lo que tiene.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "La escasez es un estado mental. Antes de quejarte por lo que te falta hoy, haz una lista mental de tres cosas valiosas que das por sentado."
            },
            237: {
                frase: "Una palabra amable es como un día de primavera.",
                autor: "Proverbio Zen (Budismo)",
                reflexion: "La dureza no es sinónimo de fuerza. Intenta cambiar tu tono hoy al corregir o hablar con alguien; la empatía abre más puertas que la hostilidad."
            },
            238: {
                frase: "Quien vence a otros es fuerte; quien se vence a sí mismo es poderoso.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "Tu mayor competencia está en el espejo. Ganarle hoy a tu pereza, a tu mal humor o a tu distracción es la victoria más real que puedes tener."
            },
            239: {
                frase: "Esfuérzate por mantenerte simple, bueno, puro, serio, libre de orgullo y amigo de la justicia.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "No necesitas adornar tu personalidad ni aparentar estatus para valer. La verdadera grandeza radica en la honestidad y la sencillez de tus actos."
            },
            240: {
                frase: "La mente es su propio lugar, y en sí misma puede hacer un cielo del infierno o un infierno del cielo.",
                autor: "John Milton (Filosofía Moderna)",
                reflexion: "Tus circunstancias de hoy cobran el sentido que tú les des. Puedes ver un imprevisto laboral como una tortura o como un reto para demostrar tu nivel."
            },
            241: {
                frase: "El ignorante afirma, el sabio duda y reflexiona.",
                autor: "Aristóteles (Filosofía Griega)",
                reflexion: "Evita sacar conclusiones apresuradas hoy. Si escuchas un rumor o te enfrentas a un malentendido, detente a analizar las cosas antes de opinar."
            },
            242: {
                frase: "La mayor riqueza es la pobreza de deseos.",
                autor: "Séneca (Estoicismo)",
                reflexion: "El marketing moderno te dice que necesitas consumir más para ser feliz. Desafía esa idea hoy dándote cuenta de que ya tienes lo necesario para estar bien."
            },
            243: {
                frase: "No juzgues cada día por la cosecha que recoges, sino por las semillas que plantas.",
                autor: "Robert Louis Stevenson (Reflexión Práctica)",
                reflexion: "A veces nos frustramos si no vemos resultados inmediatos. Hoy, concéntrate en hacer bien el trabajo pesado, la recompensa llegará a su tiempo."
            },
            244: {
                frase: "La paciencia tiene más poder que la fuerza.",
                autor: "Plutarco (Filosofía Romana)",
                reflexion: "Forzar las cosas cuando las condiciones no están dadas solo genera frustración. Aprende a esperar el momento oportuno con la mente en calma."
            },
            245: {
                frase: "La tragedia de la vida es lo que muere dentro de un hombre mientras vive.",
                autor: "Albert Schweitzer (Filosofía Existencial)",
                reflexion: "No dejes que la rutina apague tus ganas de aprender, de asombrarte o de mejorar. Rompe la inercia del día haciendo algo diferente."
            },
            246: {
                frase: "Haz lo que puedas, con lo que tengas, donde estés.",
                autor: "Theodore Roosevelt (Pragmatismo)",
                reflexion: "No esperes a que el entorno sea perfecto para empezar tu proyecto o tu entrenamiento. Usa las herramientas que tienes a la mano hoy mismo."
            },
            247: {
                frase: "El que se ahoga no se queja de la temperatura del agua.",
                autor: "Diógenes (Cinismo)",
                reflexion: "Cuando estás realmente enfocado en sobrevivir o resolver una crisis, dejas de perder el tiempo en quejas superficiales. Enfócate en lo vital."
            },
            248: {
                frase: "Quien añade conocimiento, añade dolor; pero quien añade sabiduría, añade paz.",
                autor: "Eclesiastés (Filosofía Antigua)",
                reflexion: "Saber mucho no sirve si te vuelve una persona amargada o arrogante. Traduce lo que aprendes en acciones que traigan calma a tu entorno."
            },
            249: {
                frase: "Solo los educados son libres.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "La educación te da la capacidad de pensar por ti mismo y no ser manipulado por las tendencias. Dedica un rato de hoy a estudiar algo complejo."
            },
            250: {
                frase: "No es que las cosas sean difíciles, es que nuestra falta de confianza las hace parecer así.",
                autor: "Séneca (Estoicismo)",
                reflexion: "Tu mente suele exagerar la dificultad de los retos para protegerte del fracaso. Asume el compromiso hoy y verás cómo el panorama se aclara."
            },
            251: {
                frase: "La atención es la forma más extraña y pura de la generosidad.",
                autor: "Simone Weil (Filosofía Moderna)",
                reflexion: "Cuando hables con alguien hoy, guarda el teléfono y escúchale con los cinco sentidos. Regalar tu atención completa es el mayor respeto."
            },
            252: {
                frase: "La mayor de las locuras es sacrificar la salud por cualquier otro tipo de felicidad.",
                autor: "Arthur Schopenhauer (Filosofía Moderna)",
                reflexion: "Ningún trabajo, dinero o meta justifica descuidar tu cuerpo. Duerme tus horas, come comida real y dale un respiro a tu mente hoy."
            },
            253: {
                frase: "Aquel que tiene miedo de sufrir, ya sufre de temor.",
                autor: "Michel de Montaigne (Humanismo)",
                reflexion: "Evitar los desafíos por miedo a que salgan mal te encierra en una prisión mental. Es mejor afrontar el riesgo que vivir asustado."
            },
            254: {
                frase: "El verdadero viaje de descubrimiento no consiste en buscar nuevos paisajes, sino en tener nuevos ojos.",
                autor: "Marcel Proust (Filosofía Moderna)",
                reflexion: "No necesitas cambiar de ciudad o de trabajo para ser feliz hoy. Cambia la forma en la que miras tu rutina actual y descubrirás detalles valiosos."
            },
            255: {
                frase: "La virtud no es otra cosa que la razón recta.",
                autor: "Séneca (Estoicismo)",
                reflexion: "Hacer lo correcto hoy no requiere de grandes dilemas morales; basta con usar el sentido común, la honestidad y actuar sin dañar a nadie."
            },
            256: {
                frase: "Es un gran obstáculo para la felicidad esperar una felicidad demasiado grande.",
                autor: "Bernard de Fontenelle (Ilustración)",
                reflexion: "Si condicionas tu paz mental a ganarte la lotería o a un éxito descomunal, vivirás frustrado. Aprende a disfrutar de los pequeños avances."
            },
            257: {
                frase: "Quien vive en el temor, nunca será libre.",
                autor: "Horacio (Filosofía Romana)",
                reflexion: "El miedo al qué dirán, al error o al cambio te paraliza. Identifica cuál es tu mayor temor hoy y haz una pequeña acción para desafiarlo."
            },
            258: {
                frase: "No dependas del elogio de los demás, pues nadie conoce tu valor real mejor que tú mismo.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Si subes por los aplausos de la gente, bajarás con sus críticas. Busca que tu aprobación interna sea el único juez de tus acciones hoy."
            },
            259: {
                frase: "La vida es acción y pasión, por lo tanto, se requiere que un hombre comparta la pasión y la acción de su tiempo.",
                autor: "Oliver Wendell Holmes (Pragmatismo)",
                reflexion: "No seas un simple espectador de tu propia existencia. Involúcrate a fondo en tus proyectos de hoy, pon el alma en lo que hagas."
            },
            260: {
                frase: "No busques que los demás te comprendan, busca comprenderte a ti mismo.",
                autor: "Jiddu Krishnamurti (Filosofía Oriental)",
                reflexion: "Pasamos la vida dando explicaciones a los demás. Hoy, detente y pregúntate a ti mismo qué es lo que realmente quieres y necesitas."
            },
            261: {
                frase: "Quien no se domina a sí mismo, es un esclavo de sus pasiones.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "Si un impulso de flojera, comida chatarra o enojo te controla, no eres libre. Pon un límite firme a tus impulsos el día de hoy."
            },
            262: {
                frase: "La sabiduría consiste en saber qué ignorar.",
                autor: "William James (Pragmatismo)",
                reflexion: "No toda discusión merece tu respuesta, ni toda noticia merece tu atención. Selecciona con cuidado qué batallas vas a pelear hoy."
            },
            263: {
                frase: "El tiempo disuelve lo innecesario y deja al descubierto lo esencial.",
                autor: "Cicerón (Filosofía Romana)",
                reflexion: "No te angusties si hoy pierdes algo material o una relación se enfría. El tiempo tiene una forma sabia de limpiar tu vida para dejar lo importante."
            },
            264: {
                frase: "No hay nada más suave ni más flexible que el agua, pero nada puede superarla.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "La rigidez te rompe ante las crisis. Hoy, adopta una actitud fluida: si surge un problema, adáptate como el agua en lugar de chocar de frente."
            },
            265: {
                frase: "Un hombre con coraje exterior se atreve a morir; un hombre con coraje interior se atreve a vivir.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "Afrontar la rutina con una sonrisa, mantener tus valores y no rendirte requiere un valor inmenso. Valora tu fortaleza interna el día de hoy."
            },
            266: {
                frase: "La recompensa de una buena acción es haberla hecho.",
                autor: "Séneca (Estoicismo)",
                reflexion: "Si haces un favor hoy, hazlo sin esperar las gracias o una devolución. La tranquilidad de haber actuado bien es tu verdadera ganancia."
            },
            267: {
                frase: "Si no tienes un objetivo claro, cualquier camino te parecerá correcto.",
                autor: "Aristóteles (Filosofía Griega)",
                reflexion: "Empieza tu jornada definiendo exactamente qué quieres lograr hoy. De lo contrario, terminarás gastando tus horas en las prioridades de los demás."
            },
            268: {
                frase: "La experiencia no es lo que le sucede a un hombre; es lo que un hombre hace con lo que le sucede.",
                autor: "Aldous Huxley (Filosofía Existencial)",
                reflexion: "Dos personas pueden pasar por la misma crisis y una salir destruida mientras la otra sale fortalecida. Elige ser la que aprende del golpe."
            },
            269: {
                frase: "El que piensa demasiado antes de dar un paso, pasará toda su vida en un solo pie.",
                autor: "Proverbio Chino (Filosofía Oriental)",
                reflexion: "La parálisis por análisis es una trampa. No busques el plan perfecto; toma una decisión hoy con la información que tienes y corrígela sobre la marcha."
            },
            270: {
                frase: "No dejes que la tristeza del pasado ni el temor del futuro arruinen la paz de tu presente.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Tu mente suele viajar a lugares donde ya no puedes actuar. Tráela de vuelta al presente: este momento es lo único real que posees."
            },
            271: {
                frase: "El hombre que domina su mente es capaz de dominar cualquier situación.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "El caos externo pierde su poder cuando tu mente permanece en calma. Hoy, enfócate en mantener el control de tus reacciones."
            },
            272: {
                frase: "La sencillez es la clave de la verdadera grandeza.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "No necesitas complicar tu rutina ni tus metas para que tengan valor. Simplifica tus tareas de hoy y hazlas con total enfoque."
            },
            273: {
                frase: "No busques que los acontecimientos sucedan como tú quieres, sino desea que sucedan como suceden.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "Fluir con la realidad en lugar de resistirte a ella te ahorrará frustraciones innecesarias. Adapta tus planes si el día cambia."
            },
            274: {
                frase: "El valor de la vida no está en los días que compartimos, sino en los momentos que recordamos.",
                autor: "Séneca (Estoicismo)",
                reflexion: "Haz una pausa en la prisa diaria para apreciar una buena conversación o un instante de tranquilidad. La calidad importa más que el ritmo."
            },
            275: {
                frase: "Un viaje de mil millas comienza con el primer paso.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "No te dejes paralizar por la magnitud de tus proyectos a largo plazo. Hoy solo importa avanzar un centímetro en la dirección correcta."
            },
            276: {
                frase: "La paciencia es la virtud de los fuertes.",
                autor: "Aristóteles (Filosofía Griega)",
                reflexion: "Los grandes resultados toman tiempo y constancia. Mantén el esfuerzo hoy aunque los frutos no se vean de inmediato."
            },
            277: {
                frase: "Quien no sabe lo que busca, no entiende lo que encuentra.",
                autor: "Cicerón (Filosofía Romana)",
                reflexion: "Define con claridad tus prioridades de la jornada antes de empezar a trabajar para no perder el tiempo en lo irrelevante."
            },
            278: {
                frase: "La mente bien abierta siempre encuentra espacio para el aprendizaje.",
                autor: "Sócrates (Filosofía Griega)",
                reflexion: "Escucha las opiniones de los demás hoy con curiosidad en lugar de defensiva. Siempre hay algo nuevo que rescatar."
            },
            279: {
                frase: "El verdadero progreso consiste en ser mejor que ayer, no mejor que otros.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Mídete únicamente con tu propio historial. Si hoy aprendiste algo o corregiste un error, ya estás ganando."
            },
            280: {
                frase: "La fortuna favorece a la mente preparada.",
                autor: "Séneca (Estoicismo)",
                reflexion: "El trabajo diario y silencioso es lo que te permite aprovechar las grandes oportunidades cuando aparecen. Sigue construyendo."
            },
            281: {
                frase: "Nada es tan difícil que no pueda entenderse con la debida atención.",
                autor: "Descartes (Racionalismo)",
                reflexion: "Si un problema te parece demasiado complejo hoy, desmóntalo en partes más pequeñas y abórdalas una por una."
            },
            282: {
                frase: "El silencio es a menudo el mejor argumento.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "No todas las provocaciones o debates requieren tu respuesta. Conserva tu energía mental eligiendo cuándo guardar silencio."
            },
            283: {
                frase: "No es la fuerza, sino la perseverancia lo que alcanza las grandes metas.",
                autor: "Confucio (Confucianismo)",
                reflexion: "Un esfuerzo moderado pero sostenido en el tiempo vence a cualquier impulso momentáneo de intensidad. Mantén el hábito hoy."
            },
            284: {
                frase: "Quien vive en armonía consigo mismo, vive en armonía con el universo.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Alinea tus acciones de hoy con tus valores fundamentales. Actuar con integridad es la fuente más segura de paz mental."
            },
            285: {
                frase: "El tiempo es el maestro más sabio de todos.",
                autor: "Tales de Mileto (Filosofía Griega)",
                reflexion: "No intentes forzar respuestas que solo el paso de los días aclarará. Confía en el proceso y haz lo que te toca hoy."
            },
            286: {
                frase: "La mayor victoria es la que se logra sobre uno mismo.",
                autor: "Platón (Filosofía Griega)",
                reflexion: "Vencer la flojera, la distracción o la queja hoy en la mañana te dará el impulso necesario para dominar el resto del día."
            },
            287: {
                frase: "Acepta los desafíos para poder sentir la euforia de la victoria.",
                autor: "Séneca (Estoicismo)",
                reflexion: "La incomodidad de un reto es el precio de entrada para tu crecimiento. No huyas de la dificultad hoy."
            },
            288: {
                frase: "La sabiduría empieza en el asombro.",
                autor: "Sócrates (Filosofía Griega)",
                reflexion: "No des tu rutina por sentada. Presta atención a los pequeños detalles del día como si los vieras por primera vez."
            },
            289: {
                frase: "El orden en las cosas pequeñas genera claridad en las decisiones grandes.",
                autor: "Confucio (Confucianismo)",
                reflexion: "Dedica unos minutos a organizar tu espacio de trabajo o tus notas. El orden exterior calma la mente."
            },
            290: {
                frase: "No gastes saliva en explicar lo que puedes demostrar con acciones.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "Menos promesas y más resultados. Deja que tu disciplina hable por ti a lo largo del día de hoy."
            },
            291: {
                frase: "La moderación duplica los encantos de la vida.",
                autor: "Epicuro (Epicureísmo)",
                reflexion: "Disfruta de tus placeres y descansos sin caer en el exceso. El equilibrio mantiene el disfrute a largo plazo."
            },
            292: {
                frase: "La verdad no se altera porque sea ignorada.",
                autor: "Averroes (Filosofía Medieval)",
                reflexion: "Afronta los hechos de tu realidad financiera, de salud o laboral hoy, aunque sean incómodos. Es el único punto de partida real."
            },
            293: {
                frase: "El recuerdo de los malos tiempos nos hace valorar los buenos.",
                autor: "Séneca (Estoicismo)",
                reflexion: "Usa los obstáculos pasados como perspectiva hoy para darte cuenta de lo mucho que has avanzado y superado."
            },
            294: {
                frase: "La acción es la verdadera medida de la inteligencia.",
                autor: "Aristóteles (Filosofía Griega)",
                reflexion: "Saber qué hacer no sirve de nada si no lo ejecutas. Traduce tus planes de hoy en hechos concretos inmediatos."
            },
            295: {
                frase: "Ningún día es largo para el que está ocupado en mejorar.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Cuando enfocas tus horas en construir una mejor versión de ti, el aburrimiento desaparece y el tiempo rinde más."
            },
            296: {
                frase: "La duda es el principio de la sabiduría.",
                autor: "Descartes (Racionalismo)",
                reflexion: "Cuestiona tus propias suposiciones negativas hoy antes de dar por hecho que algo saldrá mal."
            },
            297: {
                frase: "No dejes que los pequeños detalles arruinen el gran panorama.",
                autor: "Epicteto (Estoicismo)",
                reflexion: "Un contratiempo menor por la mañana no tiene por qué arruinar todo tu día. Mantén la perspectiva amplia."
            },
            298: {
                frase: "Quien tiene un amigo verdadero posee un tesoro de valor incalculable.",
                autor: "Aristóteles (Filosofía Griega)",
                reflexion: "Dedica un momento hoy para enviar un mensaje o saludar a esa persona que siempre te apoya. Cultiva tus vínculos."
            },
            299: {
                frase: "El descanso es el condimento necesario del trabajo.",
                autor: "Plutarco (Filosofía Romana)",
                reflexion: "Productividad no es trabajar hasta colapsar. Programa pausas estratégicas hoy para mantener tu mente fresca."
            },
            300: {
                frase: "La vida requiere coraje para ser vivida a fondo.",
                autor: "Sören Kierkegaard (Existencialismo)",
                reflexion: "Toma esa decisión difícil que has estado postergando. El miedo rara vez desaparece antes de actuar."
            },
            301: {
                frase: "Cada día nos trae nuevas opciones si estamos dispuestos a verlas.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "No estás atrapado en tus circunstancias. Hoy puedes elegir reaccionar de una manera completamente distinta y constructiva."
            },
            302: {
                frase: "El conocimiento es poder, pero el carácter es el verdadero motor.",
                autor: "Ciceron (Filosofía Romana)",
                reflexion: "Tus habilidades técnicas te abren puertas, pero tu integridad y constancia son las que te mantienen dentro."
            },
            303: {
                frase: "Quien no valora el centavo, no llegará al peso.",
                autor: "Proverbio Práctico",
                reflexion: "Cuida los pequeños detalles de tu presupuesto, de tu alimentación y de tu tiempo hoy. Todo suma al final."
            },
            304: {
                frase: "La calma es la mayor manifestación de la fuerza interna.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "Ante el estrés de la jornada, baja el ritmo de tu respiración y responde con deliberación, no con urgencia."
            },
            305: {
                frase: "El error no es caer, sino negarse a levantar.",
                autor: "Confucio (Confucianismo)",
                reflexion: "Si fallas en tu dieta, en tu trabajo o en tu consistencia hoy, no abandones el proceso. Limpia el tablero y vuelve a empezar."
            },
            306: {
                frase: "La generosidad de la atención es el regalo más escaso.",
                autor: "Simone Weil (Filosofía Moderna)",
                reflexion: "Cuando hables con alguien hoy, míralo a los ojos y escucha sin pensar en tu respuesta. Estar presente es respetar."
            },
            307: {
                frase: "No dependas del aplauso de los demás para validar tu esfuerzo.",
                autor: "Marco Aurelio (Estoicismo)",
                reflexion: "Haz bien tu trabajo hoy porque está alineado con tus estándares personales, no para buscar reconocimiento externo."
            },
            308: {
                frase: "La sencillez en el hablar evita complicaciones en el actuar.",
                autor: "Lao Tse (Taoísmo)",
                reflexion: "Sé directo, honesto y claro en tus mensajes de hoy. La ambigüedad solo genera malentendidos y pérdida de tiempo."
            },
            309: {
                frase: "No hay camino más seguro hacia el fracaso que intentar complacer a todos.",
                autor: "Platón (Filosofía Griega)",

        function obtenerDiaDelAno(date) {
            const inicio = new Date(date.getFullYear(), 0, 0);
            const dif = date - inicio;
            const unDia = 1000 * 60 * 60 * 24;
            return Math.floor(dif / unDia);
        }

        function mostrarReflexion(dia) {
            // Configurar fecha para el año 2026 basada en el número de día
            const fecha2026 = new Date(2026, 0, dia);
            const opciones = { day: 'numeric', month: 'long' };
            const nombreMesDia = fecha2026.toLocaleDateString('es-ES', opciones);

            // Insertar los datos en el HTML con el formato solicitado
            document.getElementById('fecha').innerText = `${nombreMesDia} de 2026 | Día ${dia} de 365`;

        }

            diaSimulado += direccion;

            if (diaSimulado > 365) diaSimulado = 1;

            diaSimulado = obtenerDiaDelAno(new Date());
